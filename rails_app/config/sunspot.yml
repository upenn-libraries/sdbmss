
# Sunspot looks for environment variable SOLR_URL, so to avoid
# confusion, we use that instead of storing the Solr hostname, port,
# and path here.

production:
  solr:
    # hostname: localhost
    port: 8983
    log_level: WARNING
    # path: /solr/production
    # read_timeout: 2
    # open_timeout: 0.5

development:
  solr:
    log_level: INFO

staging:
  solr:
    log_level: INFO

test:
  solr:
    log_level: WARNING
    # Disable auto-commit after every request so WEBrick's after_filter never
    # tries to commit to Solr during test processing.  The global StubSessionProxy
    # in rails_helper before(:each) already prevents all incidental Solr calls
    # (including User indexing during Devise login), so only tests that explicitly
    # swap in a real session will reach Solr.  Tests that need committed Solr data
    # call Sunspot::Rails.build_session and then e.index! (or similar) explicitly.
    auto_commit_after_request: false
    # 15-second timeout: generous enough for Solr's first response after startup,
    # while still bounding failures.  The 2-second value was needed when WEBrick
    # could hit Solr on every login; the global stub eliminates that risk.
    read_timeout: 15
