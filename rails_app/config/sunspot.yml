
# Sunspot looks for environment variable SOLR_URL, so to avoid
# confusion, we use that instead of storing the Solr hostname, port,
# and path here.

production:
  solr:
    # hostname: localhost
    port: 8983
    log_level: WARNING
    # path: /solr/production
    # read_timeout: 2
    # open_timeout: 0.5

development:
  solr:
    log_level: INFO

staging:
  solr:
    log_level: INFO

test:
  solr:
    log_level: WARNING
    # auto_commit_after_request defaults to true — keep it that way so that
    # records created/edited during a test are committed to Solr by WEBrick's
    # after_filter, making them immediately searchable.
    # Login is safe without disabling this: allow_any_instance_of(User).to
    # receive(:perform_index_tasks) in before(:each) means login never marks
    # the session dirty, so commit_if_dirty after login is always a no-op.
    #
    # 15-second timeout: generous enough for Solr's first response after
    # startup, while still bounding failures on a stuck/unreachable Solr.
    timeout: 15
